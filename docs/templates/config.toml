# ‚Ėź‚ĖĆ   ‚ĖĚ‚Ėö‚ĖĄ‚Ėü‚ĖĆ‚Ėó‚ĖĄ‚Ėü‚Ėô‚ĖĄ‚ĖĖ‚Ėó‚ĖĄ‚Ėü‚Ėô‚ĖĄ‚ĖĖ‚Ėą   ‚Ėą 
# ‚Ėź‚ĖĆ          ‚Ėź‚ĖĆ    ‚Ėź‚ĖĆ   ‚ĖÄ‚ĖÄ‚ĖÄ‚Ėą 
# ‚ĖĚ‚Ėö‚ĖĄ‚ĖĄ‚ĖĖ       ‚Ėź‚ĖĆ    ‚Ėź‚ĖĆ  ‚ĖĄ   ‚Ėą 
#            ‚Ėź‚ĖĆ    ‚Ėź‚ĖĆ   ‚ĖÄ‚ĖÄ‚ĖÄ  

# Discord bot token.
token = "your-discord-bot-token"

# Whether Catty sends all messages or just the responses
verbose = false

# Local HTTP server port. Use a unique port per named service running at the same time.
# port = 7990

# pi workspace/session/model settings.
[pi]
# Workspace directory Catty exposes to pi. Default: ~/.catty/workspace.
# workspace = "~/.catty/workspace"
# pi agent directory for auth.json, models.json, skills, extensions, etc. Default: pi's agent dir.
# agentDir = "~/.pi/agent"
# Run each Discord channel in its own pi session so channels can process simultaneously.
# Default is false: all channels share one main session.
# channelSessions = false
# Optional pi provider/model override. Omit to use pi defaults.
# provider = "openai-codex"
# model = "gpt-5.5"
# Optional thinking level: off, minimal, low, medium, high, xhigh. Omit to use pi default.
# thinking = "medium"

# Runtime API keys made available to pi providers.
[pi.apiKeys]
# Provider names must match pi's provider IDs. Commented because these are optional.
# openai = "optional-openai-api-key"
# ollama-cloud = "optional-ollama-cloud-key-if-your-models-json-provider-uses-this-name"

# DM authorization.
[auth]
# DM allowlist. Omit auth.users to allow anyone in DMs. Empty array allows nobody in DMs.
# users = ["dm-user-id"]

# Guild authorization for a specific guild.
# [auth.guilds."guild-id"]
# Guild-level user/role allowlists. Omit both to allow anyone in this guild.
# users = ["guild-user-id"]
# roles = ["guild-role-id"]

# Channel authorization inside a guild.
# [auth.guilds."guild-id".channels."channel-id"]
# Channel-level user/role allowlists. Omit both to allow anyone passing guild auth.
# users = ["channel-user-id"]
# roles = ["channel-role-id"]

# Response behavior.
[responses]
# Default mode: all, mention-or-reply, or prefix. Default: all.
# default = "all"
# Prefix used when mode is prefix. Default: !catty.
# prefix = "!catty"

# Per-channel response mode overrides.
# [responses.channels]
# Channel IDs map to: all, mention-or-reply, or prefix.
# channel-id = "mention-or-reply"

# Hourly heartbeat behavior. Disabled unless heartbeat.enabled is explicitly set to true.
[heartbeat]
# Enable heartbeat prompts. Required to turn heartbeat on. Default: false.
# enabled = true
# Heartbeat file path relative to workspace. Default: HEARTBEAT.md.
# file = "HEARTBEAT.md"
# Minutes between heartbeat prompts. Default: 60.
# intervalMinutes = 60
# Session mode: separate or main. Default: separate.
# session = "separate"

# DO NOT CHANGE THIS VALUE
version = 3
